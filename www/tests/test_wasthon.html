import zlib

# Test 1: round-trip on a small string
msg = b'The quick brown fox jumps over the lazy dog' * 100
print(f'Test 1: round-trip on {len(msg)} bytes')
comp = zlib.compress(msg)
print(f'  compressed: {len(comp)} bytes  (ratio: {len(comp)/len(msg)*100:.1f}%)')
dec = zlib.decompress(comp)
ok = dec == msg
print(f'  decompressed matches original: {"✓" if ok else "✗"}')
print('ok')


import re


m = re.search('world', 'hello world')
assert m is not None
assert m.string == 'hello world'
assert m.groups() == ()

m = re.match('world', 'hello world')
assert m is None

m = re.match(r"(\d+)\.(\d+)", "24.1632")

assert m.groups() == ('24', None)
assert m.groups('0') == ('24', '0')

m = re.match(r"(\d+)\.?(\d+)? (--)", "24 --")
assert m.groups() == ('24', None, '--')
assert m.groups('0') == ('24', '0', '--')

_parser = re.compile(r"""        # A numeric string consists of:
    \s*
    (?P<sign>[-+])?              # an optional sign, followed by either...

        (?P<int>\d*)             # having a (possibly empty) integer part

        (E(?P<exp>[-+]?\d+))?    # followed by an optional exponent, or...
    |
        Inf(inity)?              # ...an infinity, or...
    |
        (?P<signal>s)?           # ...an (optionally signaling)
        NaN                      # NaN
        (?P<diag>\d*)            # with (possibly empty) diagnostic info.
    )
    \s*
    \Z
""", re.VERBOSE | re.IGNORECASE).match

print(166)

_m = _parser("3.0")

_m = _parser("NaN")
assert _m.group('diag') is not None

_m = _parser("Inf")
assert _m.group('diag') is None and _m.group('sign') is None

_m = _parser("-Inf")
assert _m.group('diag') is None and _m.group('sign') == '-'
